name: Build and release

on:
  push:
    tags:
      - "v*.*.*" # e.g. v0.1.0
  workflow_dispatch: {} # allow manual runs from Actions UI
  release:
    types: [published] # run when a GitHub Release is published

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build (release)
        run: cargo build --release --verbose

      - name: Package artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item -Path target/release/quizzy.exe -Destination "release/quizzy.exe"
          Compress-Archive -Path "release/*" -DestinationPath "quizzy-${{ github.ref_name }}-${{ matrix.os }}.zip"

      - name: Package artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p release
          cp target/release/quizzy release/quizzy
          zip -j "quizzy-${{ github.ref_name }}-${{ matrix.os }}.zip" release/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quizzy-${{ matrix.os }}
          path: quizzy-${{ github.ref_name }}-${{ matrix.os }}.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
