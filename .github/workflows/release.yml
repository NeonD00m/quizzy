name: Build and release

on:
  push:
    tags:
      - "v*.*.*" # run on semver tags like v0.1.0

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          [x86_64-unknown-linux-gnu, x86_64-apple-darwin, x86_64-pc-windows-gnu]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Build release
        run: |
          rustup target add ${{ matrix.target }} || true
          cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quizzy-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/quizzy${{ matrix.target == 'x86_64-pc-windows-gnu' && '.exe' || '' }}
